server:
  port: 18080
spring:
  main:
    banner-mode: log
  application:
    name: trader-collector
  profiles:
    active: dev
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: cc.riskswap.trader.base.dao.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto

tushare:
  url : ${trader.tushare.url:https://api.tushare.pro}
  token: ${trader.tushare.token:}

trader:
  redis:
    enabled: true
    host: localhost
    port: 6379
    password: hy123!!!
    database: 0
  mysql:
    enabled: true
    url: jdbc:mysql://localhost:3306/trader?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  clickhouse:
    enabled: true
    url: jdbc:clickhouse://localhost:8123/trader
    username: default
    password: default
    driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
  task-log:
    enabled: true
  monitor:
    enabled: true
    interval: ${TRADER_MONITOR_INTERVAL:PT30S}
    log-on-publish: ${TRADER_MONITOR_LOG_ON_PUBLISH:true}
  node:
    id: ${TRADER_NODE_ID:${HOSTNAME:trader-collector}}
    type: ${TRADER_NODE_TYPE:collector}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    '[com.baomidou.mybatisplus.core.metadata.TableInfoHelper]': ERROR
    '[com.baomidou.mybatisplus.core.injector.DefaultSqlInjector]': ERROR

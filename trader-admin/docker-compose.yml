services:
  trader:
    image: docker.1ms.run/openjdk:21-jdk
    container_name: trader-admin
    restart: unless-stopped
    volumes:
      - /opt/trader/config.properties:/app/config.properties
      - ./server/trader-admin.jar:/app/trader-admin.jar
      - ./server/config:/app/config
      - ./logs:/app/logs
    working_dir: /app
    command: >
      sh -c "java $JAVA_OPTS -jar /app/trader-admin.jar
      --spring.config.location=file:/app/config/application.yml
      --logging.config=file:/app/config/logback-spring.xml"
    environment:
      - CONFIG_PATH=/app/config.properties
      - TZ=Asia/Shanghai
      - JAVA_OPTS=-Xms512m -Xmx1024m
    ports:
      - "8090:8080"

  nginx:
    image: docker.1ms.run/nginx:latest
    container_name: trader-web
    restart: unless-stopped
    ports:
      - "6060:80"
    volumes:
      - ./web:/usr/share/nginx/html
      - ./logs/nginx:/var/log/nginx
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - trader
